<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أذكار المسلم</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body {font-family:Cairo;background:#f9f7f2;margin:0}
header{background:#1b3022;color:#c5a059;padding:15px;position:sticky;top:0;z-index:999}
.container{width:90%;margin:auto}
.hero{height:300px;display:flex;align-items:center;justify-content:center;color:white;position:relative}
.hero img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:.3}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:white;padding:20px;border-radius:10px;border-bottom:4px solid #c5a059}
button{background:#1b3022;color:white;border:none;padding:5px 10px}
</style>
</head>

<body>

<header>
<div class="container">
<h2>أذكار المسلم</h2>
</div>
</header>



<main class="container">

<h3>أذكار الصباح</h3>
<div id="morning" class="grid"></div>

<h3>أذكار المساء</h3>
<div id="evening" class="grid"></div>

</main>

<script>

/* تحميل JSON */
fetch('adhkar.json')
.then(res => res.json())
.then(data => {

render("morning", data.morning);
render("evening", data.evening);

});

function render(id, list){
const container = document.getElementById(id);

list.forEach(item => {
const card = document.createElement("div");
card.className="card";

card.innerHTML = `
<p>${item.text}</p>
<div>
<span>${item.count}</span>
<button onclick="count(this)">تسبيح</button>
</div>
`;

container.appendChild(card);
});
}

/* العداد */
function count(btn){
let span = btn.previousElementSibling;
let n = parseInt(span.innerText);

if(n>0){
n--;
span.innerText=n;
}

if(n===0){
btn.innerText="تم ✓";
btn.disabled=true;
}
}

</script>

</body>
</html>
